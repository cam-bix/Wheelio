spring.application.name=wheelio-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

wheelio.email-2fa.from=${EMAIL_2FA_FROM:no-reply@wheelio.local}
wheelio.email-2fa.expiration-minutes=${EMAIL_2FA_EXPIRATION_MINUTES:10}
